$kind: http-request
name: Mark All Notifications as Read
method: PATCH
url: '{{baseUrl}}/api/notifications/read-all'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success message or count", function () {
          var jsonData = pm.response.json();
          var hasMessage = jsonData.hasOwnProperty("message");
          var hasCount = jsonData.hasOwnProperty("count");
          pm.expect(hasMessage || hasCount).to.equal(true);
      });
