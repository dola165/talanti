$kind: http-request
name: Create Post
method: POST
url: '{{baseUrl}}/api/posts'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "content": "This is a test post from Postman!",
      "mediaUrls": []
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response has post id", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.collectionVariables.set("postId", jsonData.id);
      });

      pm.test("Response has content", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("content");
          pm.expect(jsonData.content).to.equal("This is a test post from Postman!");
      });

      pm.test("Response has authorId", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("authorId");
      });
