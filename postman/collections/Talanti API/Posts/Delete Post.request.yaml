$kind: http-request
name: Delete Post
method: DELETE
url: '{{baseUrl}}/api/posts/{{postId}}'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 204 or 200", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
