$kind: http-request
name: Toggle Follow User
method: POST
url: '{{baseUrl}}/api/users/{{userId}}/follow'
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has isFollowed (boolean)", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("isFollowed");
          pm.expect(typeof jsonData.isFollowed).to.equal("boolean");
      });
