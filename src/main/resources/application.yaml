spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: talanti


  # --- MULTITHREADING (Requires Java 21+) ---
  threads:
    virtual:
      enabled: true

  # --- DATABASE & MIGRATIONS ---
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jooq:
    sql-dialect: POSTGRES

  # --- REDIS CACHING (Optional for MVP) ---
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # --- WEB & FILE UPLOADS ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

# --- LOGGING ---
logging:
  level:
    org.jooq.tools.LoggerListener: DEBUG
    org.springframework.web.socket: INFO

# --- THIRD PARTY INTEGRATIONS ---
app:
  seed:
    enabled: false
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    cache:
      default-ttl: PT5M
      my-profile-ttl: PT5M
      club-squads-ttl: PT10M
      post-comments-ttl: PT2M
      map-nearby-ttl: PT30S
    rate-limit:
      enabled: true
      login:
        max-requests: 10
        window: PT5M
      register:
        max-requests: 5
        window: PT15M
      google:
        max-requests: 10
        window: PT10M
      refresh:
        max-requests: 30
        window: PT5M
  google:
    client-id: ${GOOGLE_CLIENT_ID}
# --- JWT CONFIGURATION ---
jwt:
  issuer: "talanti"
  audience: "talanti-web"
  secret: ${JWT_SECRET}
  access-token-ttl: "PT15M"
  refresh-token-ttl: "P30D"
  cookie:
    refresh-name: "tl_refresh"
    secure: ${JWT_COOKIE_SECURE:true}
    same-site: ${JWT_COOKIE_SAME_SITE:Strict}
