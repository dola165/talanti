spring:
  application:
    name: talanti

  # --- MULTITHREADING (Requires Java 21+) ---
  # Enables Project Loom Virtual Threads.
  # This allows Spring to handle thousands of concurrent users instantly.
  threads:
    virtual:
      enabled: true

  datasource:
    # Notice we removed the hardcoded 'dola' password and fallback secrets
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jooq:
    sql-dialect: POSTGRES

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

logging:
  level:
    org.jooq.tools.LoggerListener: DEBUG
    org.springframework.web.socket: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  mapbox:
    token: ${MAPBOX_TOKEN}