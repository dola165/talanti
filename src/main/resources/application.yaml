spring:
  profiles:
    active: dev
  application:
    name: talanti

  # --- MULTITHREADING (Requires Java 21+) ---
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jooq:
    sql-dialect: POSTGRES

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

logging:
  level:
    org.jooq.tools.LoggerListener: DEBUG
    org.springframework.web.socket: INFO

app:
  mapbox:
    token: ${MAPBOX_TOKEN:}

# --- PRODUCTION JWT DEFAULTS ---
# --- JWT CONFIGURATION ---
jwt:
  issuer: "talanti"
  audience: "talanti-web"
  # Syntax: ${ENV_VAR:default_value}
  # If JWT_SECRET is missing, it automatically uses this valid 32-byte Base64 key!
  secret: ${JWT_SECRET:TXlTdXBlclNlY3JldEtleVRoYXRJc0F0TGVhc3QzMkJ5dGVzTG9uZw==}
  access-token-ttl: "PT15M"
  refresh-token-ttl: "P30D"
  cookie:
    refresh-name: "tl_refresh"
    secure: false      # Set to false so cookies work on localhost HTTP
    same-site: "Lax"